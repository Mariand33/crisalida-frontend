<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Crisálida</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #140f21, #2d1f47);
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      padding: 4px;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 30px;
    }

    .brand-text p {
      margin: 4px 0 0;
      color: #d8cfff;
    }

    .volver {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
    }

    .sidebar,
    .main,
    .comentarios {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
    }

    .sidebar {
      padding: 20px;
      height: fit-content;
    }

    .modulo {
      margin-bottom: 20px;
    }

    .modulo h2 {
      font-size: 18px;
      margin: 0 0 12px;
      color: #f4d58d;
    }

    .clase {
      background: rgba(255,255,255,0.05);
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s ease;
      border: 1px solid transparent;
    }

    .clase:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.08);
    }

    .clase.activa {
      border-color: #b48cff;
      background: rgba(180,140,255,0.16);
    }

    .clase.bloqueada {
      opacity: 0.7;
      border-style: dashed;
    }

    .clase small {
      display: block;
      margin-top: 6px;
      color: #d8cfff;
    }

    .main {
      padding: 22px;
    }

    .video-titulo {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 28px;
    }

    iframe {
      width: 100%;
      height: 460px;
      border: none;
      border-radius: 16px;
      background: black;
    }

    .pdfs {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pdfs a {
      background: linear-gradient(90deg, #b84cff, #7f3cff);
      color: white;
      padding: 12px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .resumen {
      margin-top: 22px;
      background: rgba(255,255,255,0.05);
      padding: 18px;
      border-radius: 14px;
    }

    .resumen h3,
    .resumen h4 {
      margin-top: 0;
    }

    .resumen p,
    .resumen li {
      color: #e7ddff;
    }

    .comentarios {
      margin-top: 22px;
      padding: 20px;
    }

    .comentarios h3 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      border: none;
      border-radius: 12px;
      padding: 14px;
      resize: vertical;
      margin-top: 10px;
      font-family: inherit;
    }

    .comentarios button {
      margin-top: 12px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #b48cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .comentario-item {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      color: #f1ecff;
    }

    .placeholder {
      color: #d8cfff;
      font-size: 18px;
    }

    .bloqueo-box {
      text-align: center;
      padding: 40px 20px;
    }

    .bloqueo-box h2 {
      margin-top: 0;
      font-size: 30px;
    }

    .bloqueo-box p {
      color: #e7ddff;
      max-width: 600px;
      margin: 0 auto 18px;
    }

    .boton-desbloquear {
      display: inline-block;
      margin-top: 10px;
      background: linear-gradient(90deg, #b84cff, #7f3cff);
      padding: 15px 24px;
      border-radius: 12px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      iframe {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <img src="assets/logo-circular.png" alt="Logo Crisálida" />
        <div class="brand-text">
          <h1 id="titulo-curso">Curso</h1>
          <p>Campus del alumno · Escuela Crisálida</p>
        </div>
      </div>

      <a class="volver" href="index.html">← Volver al panel</a>
    </div>

    <div class="layout">
      <aside class="sidebar" id="modulos-container"></aside>

      <section>
        <div class="main" id="video-box">
          <p class="placeholder">Seleccioná una clase para comenzar.</p>
        </div>

        <div class="comentarios">
          <h3>Comentarios y dudas</h3>
          <textarea id="comentarioTexto" placeholder="Escribí tu comentario o duda sobre la clase..."></textarea>
          <button onclick="agregarComentario()">Enviar comentario</button>
          <div id="listaComentarios"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const curso = window.cursosData[0];
    document.getElementById("titulo-curso").innerText = curso.nombre;

    const container = document.getElementById("modulos-container");

    curso.modulos.forEach((modulo) => {
      const moduloDiv = document.createElement("div");
      moduloDiv.className = "modulo";

      const tituloModulo = document.createElement("h2");
      tituloModulo.textContent = modulo.titulo;
      moduloDiv.appendChild(tituloModulo);

      modulo.clases.forEach((clase) => {
        const claseDiv = document.createElement("div");
        claseDiv.className = "clase";

        let etiqueta = "Ver clase y materiales";
        let bloqueada = false;

        if (clase.tipo === "masterclass") {
          etiqueta = "🔥 Masterclass";
        }

        if (clase.tipo === "clave") {
          etiqueta = "⭐ Clase clave";
        }

        if (clase.tipo === "bloqueado") {
          etiqueta = "🔒 Clase bloqueada";
          bloqueada = true;
          claseDiv.classList.add("bloqueada");
        }

        claseDiv.innerHTML = `
          <strong>${clase.titulo}</strong>
          <small>${etiqueta}</small>
        `;

        if (!bloqueada) {
          claseDiv.addEventListener("click", () => {
            document.querySelectorAll(".clase").forEach((el) => el.classList.remove("activa"));
            claseDiv.classList.add("activa");
            verClase(clase);
          });
        } else {
          claseDiv.addEventListener("click", () => {
            document.querySelectorAll(".clase").forEach((el) => el.classList.remove("activa"));
            claseDiv.classList.add("activa");
            mostrarBloqueo();
          });
        }

        moduloDiv.appendChild(claseDiv);
      });

      container.appendChild(moduloDiv);
    });

    function verClase(clase) {
      const temasHtml = (clase.temas || [])
        .map((tema) => `<li>${tema}</li>`)
        .join("");

      document.getElementById("video-box").innerHTML = `
        <h2 class="video-titulo">${clase.titulo}</h2>

        <iframe
          src="https://www.youtube.com/embed/${clase.videoId}?rel=0"
          allowfullscreen>
        </iframe>

        <div class="pdfs">
          <a href="https://www.youtube.com/watch?v=${clase.videoId}" target="_blank">Ver en YouTube</a>

          ${clase.pdf1 && clase.pdf1 !== "#" ? `<a href="${clase.pdf1}" target="_blank">Descargar PDF guía</a>` : ""}

          ${clase.pdf2 && clase.pdf2 !== "#" ? `<a href="${clase.pdf2}" target="_blank">Descargar PDF práctica</a>` : ""}
        </div>

        <div class="resumen">
          <h3>Resumen de la clase</h3>
          <p>${clase.resumen || ""}</p>

          <h4>Temas clave</h4>
          <ul>${temasHtml}</ul>
        </div>
      `;
    }

    function mostrarBloqueo() {
      document.getElementById("video-box").innerHTML = `
        <div class="bloqueo-box">
          <h2>🔒 Clase bloqueada</h2>
          <p>
            Esta clase forma parte del contenido completo de Tarología I.
            Accedé al curso para desbloquear todos los módulos, materiales y clases.
          </p>
          <a href="https://mpago.la/2cBFd48" target="_blank" class="boton-desbloquear">Desbloquear curso completo</a>
        </div>
      `;
    }

    let comentarios = [];

    function agregarComentario() {
      const texto = document.getElementById("comentarioTexto").value.trim();
      if (!texto) return;

      comentarios.push(texto);
      document.getElementById("comentarioTexto").value = "";
      renderComentarios();
    }

    function renderComentarios() {
      document.getElementById("listaComentarios").innerHTML = comentarios
        .map((c) => `<div class="comentario-item">${c}</div>`)
        .join("");
    }
  </script>
</body>
</html>
