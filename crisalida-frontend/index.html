<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escuela Crisálida</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e1b2e, #3a2d5c);
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
    }

    .fondo-simbolo {
      position: fixed;
      right: -120px;
      bottom: -120px;
      width: 420px;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }

    .pantalla-login,
    .pantalla-panel {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .logo-login {
      width: 180px;
      max-width: 100%;
      margin: 0 auto 18px;
      display: block;
    }

    .subtitulo {
      margin-bottom: 25px;
      color: #e4d8ff;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #b84cff, #7f3cff);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    #resultado {
      margin-top: 18px;
      text-align: center;
      font-weight: bold;
    }

    .panel {
      width: 100%;
      max-width: 1150px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .branding {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .logo-panel {
      width: 70px;
      height: 70px;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      padding: 6px;
    }

    .logo-texto {
      width: 220px;
      max-width: 100%;
      display: block;
      margin-bottom: 8px;
    }

    .panel-header p {
      color: #d8cfff;
    }

    .cerrar-btn {
      width: auto;
      padding: 12px 20px;
    }

    .cursos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .curso-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    .curso-card h3 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .curso-card p {
      color: #d8cfff;
      margin-bottom: 18px;
    }

    .curso-card button {
      width: 100%;
    }

    .oculto {
      display: none;
    }
  </style>
</head>
<body>

  <img src="Activos/rueda-zodiacal.png" alt="Rueda zodiacal" class="fondo-simbolo" />


  <div class="pantalla-login" id="pantalla-login">
    <div class="container">
      <img src="Activos/logo-horizontal.png" alt="Escuela Crisálida" class="logo-login" />
      <div class="subtitulo">Accedé a tus clases de tarot y astrología</div>

      <input type="email" id="email" placeholder="Ingresá tu email" />
      <input type="password" id="password" placeholder="Ingresá tu contraseña" />

      <button onclick="login()">Ingresar</button>

      <p id="resultado"></p>
    </div>
  </div>

  <div class="pantalla-panel oculto" id="pantalla-panel">
    <div class="panel">
      <div class="panel-header">
        <div class="branding">
          <img src="Activos/logo-circular.png" alt="Logo Crisálida" class="logo-panel" />
          <div>
            <img src="Activos/logo-horizontal.png" alt="Escuela Crisálida" class="logo-texto" />
            <p id="bienvenida">Bienvenido</p>
          </div>
        </div>
        <button class="cerrar-btn" onclick="cerrarSesion()">Cerrar sesión</button>
      </div>

      <div class="cursos-grid" id="lista-cursos"></div>
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const response = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      document.getElementById("resultado").innerText = data.mensaje;

      if (response.ok) {
        document.getElementById("pantalla-login").classList.add("oculto");
        document.getElementById("pantalla-panel").classList.remove("oculto");
        document.getElementById("bienvenida").innerText = `Bienvenido, ${data.usuario.nombre}`;

        const usuarioId = data.usuario.id;
        const cursosResponse = await fetch(`http://localhost:3000/mis-cursos/${usuarioId}`);
        const cursos = await cursosResponse.json();

        const lista = document.getElementById("lista-cursos");
        lista.innerHTML = "";

        cursos.forEach(curso => {
          const card = document.createElement("div");
          card.className = "curso-card";

          card.innerHTML = `
            <h3>${curso.nombre}</h3>
            <p>${curso.categoria}</p>
            <button onclick="entrarCurso('${curso.nombre}')">Entrar al curso</button>
          `;

          lista.appendChild(card);
        });
      }
    }

    function entrarCurso(nombreCurso) {
      alert("Próximamente entrarás a: " + nombreCurso);
    }

    function cerrarSesion() {
      document.getElementById("pantalla-login").classList.remove("oculto");
      document.getElementById("pantalla-panel").classList.add("oculto");
      document.getElementById("resultado").innerText = "";
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      document.getElementById("lista-cursos").innerHTML = "";
    }
  </script>
</body>
</html>
